<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>


    <fieldset>
        <legend>Registration Form</legend>

        <form action="post" method="POST">


            Name: <input type="text" id="username"><br><br>

            Gender: <input type="radio" name="gender" id="male" value="male">Male <input type="radio" name="gender"
                id="female" value="female">Female <br><br>

            Mobile: <input type="text" id="mobile"><br><br>

            Address: <br><textarea name="address" id="address" width="20000" height="100"></textarea> <br><br>

            Country: <select name="country" id="country">
                <option value="IN" selected>India</option>
                <option value="US">USA</option>
                <option value="UK">UK</option>
                <option value="UAE" >UAE</option>
            </select> <br><br>

            Email: <input type="email" id="email"><br><br>

            Password: <input type="password" id="password"><br><br>

            <input type="submit" value="Submit">
            
        </form>
    </fieldset>
</body>

</html>
