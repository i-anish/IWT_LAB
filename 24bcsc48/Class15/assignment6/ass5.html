<html>
    <head>
        <title>Question 5</title>
    </head>
    <body>
        <h2>Prime Check</h2>
        <input type="number" id="inputnum" placeholder="Enter any number">
        <button id="forcheck">Check Prime</button>
    </body>
    <script language="javascript">
        const inputnum = document.getElementById("inputnum");
        const forcheck = document.getElementById("forcheck");
        function checkprime() {
            let c = 0; 

            if (inputnum.value === "") {
                alert("Please enter a number");
                return;
            }
            const num = (inputnum.value);

            let isPrime = true;
            for (let i=2; i < Math.sqrt(num); i++) {
                if (num % i === 0) {
                    isPrime = false;
                    break;
                }
            }
            if (isPrime && num > 1) {
                alert("Your Number is Prime Yayyyyy !!!");
            } else {
                alert("Your Number is not Prime :)");
            }
        }
        forcheck.addEventListener("click", checkprime);
    </script>
</html>
