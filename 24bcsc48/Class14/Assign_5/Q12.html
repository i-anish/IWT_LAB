<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>

        function fibonacciGenerator(n){

            let arr = [];

            let first = 0, second = 1;

            for(let i=1;i<=n;i++){
                if(i===1)
                    arr.push(first);
                else if(i===2)
                    arr.push(second);
                else{
                    let next = first + second;
                    arr.push(next);
                    first = second;
                    second = next;
                }
                
            }

            console.log(arr);
        }

        fibonacciGenerator(10);
    </script>
</body>
</html>
