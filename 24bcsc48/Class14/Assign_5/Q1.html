<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>
        let grade = parseInt(prompt('Enter marks'))

        if(grade>=90)
            console.log('Grade A')
        else if(grade>=75)
            console.log('Grade B')
        else if(grade>=50)
            console.log('Grade C')
        else
            console.log('Fail');
    </script>
</body>
</html>
