<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>
        
        let arr = new Array(10,56,90,100,45,78,23);
        let sum = 0
        for(let i=0;i<arr.length;i++){
            sum += arr[i];
        }

        console.log(`Sum of elements: ${sum}`)
        console.log(`Avg of elements: ${sum/arr.length}`)
        console.log(`Max of elements: ${Math.max(...arr)}`)
        console.log(`Min of elements: ${Math.min(...arr)}`)
    </script>
</body>
</html>
