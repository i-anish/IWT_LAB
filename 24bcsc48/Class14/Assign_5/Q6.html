<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>
        
        let arr = new Array(1,1,2,3,1,2,8,10,10,2,3,3,8);

        let set = new Set();

        let newArr = []

        arr.forEach(element => {
            if (!set.has(element)){
                newArr.push(element);
                set.add(element);
            }
        });

        console.log(newArr)
        
    </script>
</body>
</html>
