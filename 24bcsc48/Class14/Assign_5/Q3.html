<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>
        
        let num = parseInt(prompt('Enter a number: '));
        
        let temp = num
        let rev = 0;

        while(num>0){
            rev = (rev*10) + (num%10);
            num = Math.floor(num/10);
        }

        console.log(temp===rev?`${temp} is palindrome`:`${temp} is not palindrome.`);

    </script>
</body>
</html>
