<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    

    <div class="box">

        <div class="display">
            <input readonly type="text" name="resDis" id="resDis">
        </div>

        <div class="buttons">
            <button class="button 0" value="0">0</button>
            <button class="button 1" value="1">1</button>
            <button class="button 2" value="2">2</button>
            <button class="button 3" value="3">3</button>
            <button class="button 4" value="4">4</button><br>
            <button class="button 5" value="5">5</button>
            <button class="button 6" value="6">6</button>
            <button class="button 7" value="7">7</button>
            <button class="button 8" value="8">8</button>
            <button class="button 9" value="9">9</button><br>
            <button class="button plus" style="background-color: orangered;" value="+">+</button>
            <button class="button minus" style="background-color: orangered;" value="-">-</button>
            <button class="button into" style="background-color: orangered;" value="*">x</button>
            <button class="button div" style="background-color: orangered;" value="/">/</button>
            <button class="button rem" style="background-color: orangered;" value="%">%</button>
            <button class="button clr" style="background-color: orange;">CLR</button>
            <button class="button equal" style="background-color: orange;">=</button>
            
        </div>
    </div>


    <script src="script.js"></script>
</body>
</html>
